<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVLIS Inventory Tracker</title>
    <script src="https://cdn.jsdelivr.net/gh/schmich/instascan-builds@master/instascan.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 15px; background-color: #f4f4f9; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 950px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        h2, h3 { color: #333; margin-top: 0; }
        
        /* Menu Bar Styles */
        .navbar { display: flex; background: #2c3e50; border-radius: 8px; margin-bottom: 25px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-item { flex: 1; text-align: center; padding: 14px; color: #ecf0f1; cursor: pointer; font-weight: bold; transition: background 0.2s, color 0.2s; user-select: none; font-size: 14px; }
        .nav-item:hover { background: #34495e; color: #fff; }
        .nav-item.active { background: #007bff; color: white; }

        /* Tab Content Toggling */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Layout Grid */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { 
            body { margin: 5px; }
            .container { padding: 15px; }
            .dashboard-grid { grid-template-columns: 1fr; } 
            .navbar { flex-direction: row; }
            .nav-item { padding: 10px; font-size: 12px; }
        }

        /* Scanner Section Layout */
        .scanner-section { background: #e9ecef; padding: 20px; border-radius: 8px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center;}
        #preview { width: 100%; max-width: 320px; height: auto; border: 3px solid #333; border-radius: 8px; background: #000; }
        .status-badge { background: #007bff; color: white; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-top: 10px; display: inline-block; }
        
        /* Tables & Buttons */
        button { background-color: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; margin: 5px; transition: background 0.2s; }
        button:hover { background-color: #0056b3; }
        button.danger { background-color: #dc3545; }
        button.danger:hover { background-color: #bd2130; }
        button.success { background-color: #28a745; }
        button.success:hover { background-color: #218838; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        /* Compact inline buttons for table utility operations */
        button.action-btn { padding: 4px 8px; font-size: 12px; margin: 0 2px; border-radius: 4px; font-weight: normal; }
        button.edit-btn { background-color: #ffc107; color: #212529; }
        button.edit-btn:hover { background-color: #e0a800; }

        .table-container { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 15px; height: 350px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 14px; }
        th { background-color: #f8f9fa; color: #555; position: sticky; top: 0; }
        
        /* Forms Styling */
        .management-box { background: #f8f9fa; border: 1px dashed #007bff; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .inline-form { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .inline-form input, .inline-form select { flex: 1; min-width: 130px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: white; font-size: 14px; }
        
        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(3px); padding: 10px; box-sizing: border-box; }
        .modal-content { background: white; padding: 25px; border-radius: 10px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); box-sizing: border-box; }
        input[type="number"], input[type="date"], .modal input[type="text"], .modal select { width: 95%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        .modal select { text-align-last: center; }
        input[type="number"], input[type="date"], .modal input[type="text"] { text-align: center; }
        .modal label { font-size: 13px; font-weight: bold; color: #555; text-align: left; display: block; margin-left: 2%; margin-top: 5px; }

        /* Notification Icon Layout States */
        .notif-icon { font-size: 48px; margin-bottom: 10px; display: block; }
        .notif-success { color: #28a745; }
        .notif-error { color: #dc3545; }

        .log-add { color: #28a745; font-weight: bold; }
        .log-release { color: #dc3545; font-weight: bold; }
        .unit-label { font-size: 12px; color: #666; background: #e9ecef; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }

        /* Layout header for report tools */
        .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .report-header h3 { margin: 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 CVLIS Inventory Tracker</h2>
    
    <div class="navbar">
        <div id="nav-inventory" class="nav-item active" onclick="switchTab('inventory')">📦 Inventory</div>
        <div id="nav-employees" class="nav-item" onclick="switchTab('employees')">👥 Employees</div>
        <div id="nav-report" class="nav-item" onclick="switchTab('report')">📊 Report</div>
    </div>

    <div id="tab-inventory" class="tab-content active">
        <div class="management-box">
            <h4 style="margin: 0; color: #007bff;">➕ Add New Item Type</h4>
            <p style="margin: 2px 0 10px 0; font-size: 12px; color: #666;">Register a new product code into the registry database.</p>
            <div class="inline-form">
                <input type="text" id="newItemId" placeholder="e.g., ITEM004" style="text-transform: uppercase;">
                <input type="text" id="newItemName" placeholder="e.g., Logitech Headset">
                <select id="newItemUnit">
                    <option value="pcs">pcs</option>
                    <option value="box">box</option>
                    <option value="set">set</option>
                    <option value="unit">unit</option>
                    <option value="pack">pack</option>
                    <option value="kg">kg</option>
                </select>
                <button type="button" style="padding: 8px 15px; margin: 0;" onclick="createNewItemType()">Register Item</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="scanner-section">
                <h3>📷 Live QR Feed</h3>
                <div id="videoContainer">
                    <video id="preview" autoplay playsinline muted></video>
                </div>
                <button id="switchCamBtn" style="background: #34495e; font-size: 12px; padding: 6px 12px; margin-top: 10px;" onclick="cycleCameras()">🔄 Switch Camera Lens</button>
                <div id="scannerStatus" class="status-badge">🔄 Initializing...</div>
            </div>

            <div>
                <h3>📋 Current Stock Levels</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>Item ID</th><th>Item Name / Unit</th><th>In Stock</th><th style="width: 70px; text-align: center;">Action</th></tr>
                        </thead>
                        <tbody id="inventoryTable"></tbody>
                    </table>
                </div>
                <button style="margin-top:10px; background:#6c757d; font-size:12px; padding:6px 12px;" onclick="resetDatabase()">🔄 Reset Demo Data</button>
            </div>
        </div>
    </div>

    <div id="tab-employees" class="tab-content">
        <div class="management-box">
            <h4 style="margin: 0; color: #28a745;">➕ Add New Personnel / Receiver</h4>
            <p style="margin: 2px 0 10px 0; font-size: 12px; color: #666;">Register a new employee badge ID code into the system authority registry.</p>
            <div class="inline-form">
                <input type="text" id="newEmpId" placeholder="Employee Number" style="text-transform: uppercase;">
                <input type="text" id="newEmpName" placeholder="EMPLOYEE NAME">
                <button type="button" style="padding: 8px 15px; margin: 0; background-color: #28a745;" onclick="createNewEmployee()">Register Employee</button>
            </div>
        </div>

        <h3>👥 Registered Personnel Registry</h3>
        <div class="table-container" style="height: 350px;">
            <table>
                <thead>
                    <tr><th>Employee ID</th><th>Full Name</th><th>Authorization Access</th><th style="width: 110px; text-align: center;">Actions</th></tr>
                </thead>
                <tbody id="employeesTable"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-report" class="tab-content">
        <div class="report-header">
            <h3 style="margin: 0;">📜 Transaction Audit Log (Tracking System)</h3>
            <button class="success" style="margin: 0; padding: 8px 16px; font-size: 13px;" onclick="exportToExcel()">📥 Export to Excel</button>
        </div>
        <div class="table-container" style="height: 400px;">
            <table>
                <thead>
                    <tr><th>Timestamp</th><th>Item ID</th><th>Action</th><th>Qty</th><th>Employee / Recipient</th><th>Date Authorized</th></tr>
                </thead>
                <tbody id="logTable"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="optionsModal" class="modal">
    <div class="modal-content">
        <h3 id="modalItemTitle">Item Detected</h3>
        <p>What would you like to do with this stock?</p>
        <button onclick="openAddModal()">➕ Add Stock</button>
        <button class="danger" onclick="handleReleaseVerification()">➖ Release Stock</button>
        <br><br><button style="background:#6c757d; width: 100%;" onclick="closeModals()">Cancel Action</button>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <h3>How many to ADD?</h3>
        <input type="number" id="addQty" min="1" value="1">
        <button style="width: 100%;" onclick="submitAdd()">Submit to Inventory</button>
        <br><br><button style="background:#6c757d; width: 100%;" onclick="closeModals()">Cancel</button>
    </div>
</div>

<div id="releaseModal" class="modal">
    <div class="modal-content">
        <h3>How many to RELEASE?</h3>
        <input type="number" id="releaseQty" min="1" value="1">
        <button style="width: 100%;" onclick="openEmployeeSelectionModal()">Next: Verify Receiver</button>
        <br><br><button style="background:#6c757d; width: 100%;" onclick="closeModals()">Cancel</button>
    </div>
</div>

<div id="employeeModal" class="modal">
    <div class="modal-content">
        <h3>👤 Receiver Verification</h3>
        <p style="color: #007bff; font-weight: bold; background: #e7f1ff; padding: 8px; border-radius: 4px; font-size: 13px; margin-bottom: 15px;">
            👉 Select the receiving employee from the list below.
        </p>
        
        <p style="margin-bottom: 5px; font-weight: bold; color: #555; text-align: left; padding-left: 10px;">Select Employee:</p>
        <select id="employeeDropdown" onchange="handleEmployeeSelect()">
            </select>
        
        <p style="margin-top: 15px; margin-bottom: 5px; font-weight: bold; color: #555; text-align: left; padding-left: 10px;">Choose Release Date:</p>
        <input type="date" id="releaseDate">
        
        <button id="finalReleaseBtn" style="width: 100%; margin-top: 15px;" onclick="submitRelease()" disabled>Confirm & Deduct Stock</button>
        <br><br><button style="background:#6c757d; width: 100%;" onclick="closeModals()">Cancel Transaction</button>
    </div>
</div>

<div id="editEmployeeModal" class="modal">
    <div class="modal-content">
        <h3 style="color: #ffc107; margin-bottom: 10px;">✏️ Edit Employee Profile</h3>
        <p style="font-size: 12px; color: #666; margin-bottom: 15px;">Modify this worker's identification parameters below.</p>
        
        <label for="editEmpIdInput">Employee ID / Number:</label>
        <input type="text" id="editEmpIdInput" style="text-transform: uppercase;">
        
        <label for="editEmpNameInput">Full Name:</label>
        <input type="text" id="editEmpNameInput">
        
        <br><br>
        <button style="width: 100%; background-color: #28a745;" onclick="submitEmployeeEdit()">Save Changes</button>
        <button style="background:#6c757d; width: 100%; margin-top: 5px;" onclick="closeModals()">Cancel Changes</button>
    </div>
</div>

<div id="notificationModal" class="modal">
    <div class="modal-content">
        <span id="notifIcon" class="notif-icon"></span>
        <h3 id="notifTitle">Notification</h3>
        <p id="notifMessage" style="color: #555; font-size: 15px; margin-bottom: 20px;"></p>
        <button id="notifCloseBtn" style="width: 100%; background-color: #007bff;" onclick="closeModals()">Acknowledge</button>
    </div>
</div>

<script>
// Default Seed Data
const defaultInventory = {
    "ITEM001": { name: "Wireless Mouse Logi", unit: "pcs", quantity: 12 },
    "ITEM002": { name: "Mechanical Keyboard RGB", unit: "pcs", quantity: 0 },
    "ITEM003": { name: "Dell 27-inch Monitor", unit: "unit", quantity: 5 }
};

const defaultEmployees = {
    "EMP01": "Juan Dela Cruz",
    "EMP02": "Maria Santos",
    "EMP03": "Alex King"
};

// Global system states
let inventory = JSON.parse(localStorage.getItem("qr_inventory")) || defaultInventory;
let employees = JSON.parse(localStorage.getItem("qr_employees")) || defaultEmployees;
let transactionLogs = JSON.parse(localStorage.getItem("qr_logs")) || [];

let activeItemId = "";
let pendingReleaseQty = 0;
let activeEmployeeId = "";
let editingOldEmpId = ""; 

// Camera tracking state configurations
let availableCameras = [];
let currentCamIndex = 0;
let currentStream = null; // Track the active video stream

// Initialize the Instascan Object (Don't pass video initially)
let scanner = new Instascan.Scanner({ scanPeriod: 5 });

scanner.addListener('scan', function (content) {
    let cleanCode = content.trim().toUpperCase();
    if (cleanCode.includes("://") || cleanCode.includes("WWW.")) {
        let parts = cleanCode.split('/');
        cleanCode = parts[parts.length - 1]; 
    }
    handleItemScan(cleanCode);
});

// Modern Mobile Camera System Initialization
function initCameraSystem() {
    updateBadgeDisplay("🔄 Initializing System Cameras...", "#007bff");
    
    // Stop any previous scanner activity or native tracks
    stopActiveStreams();

    Instascan.Camera.getCameras().then(function (cameras) {
        if (cameras.length > 0) {
            availableCameras = cameras;
            
            // Prioritize the back camera
            let targetIndex = 0; 
            let backCamKeywords = ['back', 'rear', 'environment', 'main', 'camera 1', 'facing back', '0'];
            
            for (let i = 0; i < cameras.length; i++) {
                let label = cameras[i].name ? cameras[i].name.toLowerCase() : '';
                if (backCamKeywords.some(keyword => label.includes(keyword))) {
                    targetIndex = i;
                    break;
                }
            }
            
            // Fallback: On many phones, the true back camera is listed last
            if (targetIndex === 0 && cameras.length > 1) {
                targetIndex = cameras.length - 1;
            }
            
            currentCamIndex = targetIndex;
            startSelectedCamera();
        } else {
            updateBadgeDisplay("🔴 Camera not found.", "#dc3545");
        }
    }).catch(function(e) {
        console.error(e);
        updateBadgeDisplay("🔴 Permissions Blocked / Require HTTPS", "#dc3545");
    });
}

function startSelectedCamera() {
    if (availableCameras.length > 0) {
        let targetCamera = availableCameras[currentCamIndex];
        const videoElement = document.getElementById('preview');

        // Use standard constraints to enforce phone media access explicitly
        let constraints = {
            video: {
                deviceId: targetCamera.id ? { exact: targetCamera.id } : undefined,
                facingMode: currentCamIndex === 0 ? "user" : "environment"
            },
            audio: false
        };

        // Standard WebRTC initialization alongside Instascan fallback
        navigator.mediaDevices.getUserMedia(constraints)
            .then(function(stream) {
                currentStream = stream;
                videoElement.srcObject = stream;
                videoElement.setAttribute("playsinline", true); // Fix Safari/iOS lockup
                videoElement.play();
                
                // Attach the active stream directly to the scanner engine
                return scanner.start(targetCamera);
            })
            .then(() => {
                updateBadgeDisplay("🟢 Camera Active: Scan an Item", "#28a745");
            })
            .catch(err => {
                console.warn("Advanced stream routing failed, falling back to basic setup...", err);
                // Fallback to basic method if constraints crash on older OS versions
                scanner.start(targetCamera).then(() => {
                    updateBadgeDisplay("🟢 Camera Active: Scan an Item", "#28a745");
                }).catch(e => {
                    updateBadgeDisplay("🔴 Stream Busy/Error", "#dc3545");
                });
            });
    }
}

// Helper to kill old tracks before initiating a camera lens swap
function stopActiveStreams() {
    if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        currentStream = null;
    }
}

function cycleCameras() {
    if (availableCameras.length <= 1) {
        showSystemNotification("Toggle Unavailable", "This hardware package lists only 1 active camera device.", false);
        return;
    }
    
    currentCamIndex = (currentCamIndex + 1) % availableCameras.length;
    updateBadgeDisplay("🔄 Switching Lens...", "#34495e");
    
    // Explicitly stop both Instascan and browser media streams before swapping
    scanner.stop().then(() => {
        stopActiveStreams();
        startSelectedCamera();
    });
}

// Fire up the modern hardware camera engine
initCameraSystem();

function switchTab(targetTab) {
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`tab-${targetTab}`).classList.add('active');
    document.getElementById(`nav-${targetTab}`).classList.add('active');
}

function showSystemNotification(title, message, isSuccess = true) {
    const iconSpan = document.getElementById("notifIcon");
    const titleH3 = document.getElementById("notifTitle");
    const msgP = document.getElementById("notifMessage");
    const closeBtn = document.getElementById("notifCloseBtn");

    if (isSuccess) {
        iconSpan.innerText = "✅";
        iconSpan.className = "notif-icon notif-success";
        titleH3.style.color = "#28a745";
        closeBtn.style.backgroundColor = "#28a745";
    } else {
        iconSpan.innerText = "🚨";
        iconSpan.className = "notif-icon notif-error";
        titleH3.style.color = "#dc3545";
        closeBtn.style.backgroundColor = "#dc3545";
    }

    titleH3.innerText = title;
    msgP.innerText = message;
    openModal("notificationModal");
}

// --- INVENTORY MANAGEMENT ENGINES ---
function createNewItemType() {
    let idInput = document.getElementById("newItemId");
    let nameInput = document.getElementById("newItemName");
    let unitInput = document.getElementById("newItemUnit");
    
    let itemId = idInput.value.trim().toUpperCase();
    let itemName = nameInput.value.trim();
    let itemUnit = unitInput.value;
    
    if (!itemId || !itemName) {
        showSystemNotification("Registration Void", "Please fill out both the Item ID and Item Name fields.", false);
        return;
    }
    if (inventory[itemId]) {
        showSystemNotification("Item Conflict", `Item ID "${itemId}" already exists in the system registry.`, false);
        return;
    }
    
    inventory[itemId] = { name: itemName, unit: itemUnit, quantity: 0 };
    logTransaction(itemId, "ADD", 0, "System Initialization", new Date().toLocaleDateString());
    saveAndRefresh();
    
    idInput.value = "";
    nameInput.value = "";
    showSystemNotification("Item Registered", `"${itemId}" successfully added with 0 units.`);
}

function deleteItem(itemId) {
    if (confirm(`⚠️ Completely delete "${inventory[itemId].name}" (${itemId})?`)) {
        logTransaction(itemId, "DELETE", inventory[itemId].quantity, "System Management", new Date().toLocaleDateString());
        delete inventory[itemId];
        saveAndRefresh();
    }
}

// --- PERSONNEL MANAGEMENT ENGINES ---
function createNewEmployee() {
    let idInput = document.getElementById("newEmpId");
    let nameInput = document.getElementById("newEmpName");
    let empId = idInput.value.trim().toUpperCase();
    let empName = nameInput.value.trim();
    
    if (!empId || !empName) {
        showSystemNotification("Input Blank", "Please fill out both the Employee ID and Full Name fields.", false);
        return;
    }
    if (employees[empId]) {
        showSystemNotification("ID Conflict", `Employee ID "${empId}" already exists in the system database.`, false);
        return;
    }
    
    employees[empId] = empName;
    saveAndRefresh();
    idInput.value = "";
    nameInput.value = "";
    showSystemNotification("Personnel Added", `Employee profile "${empId}" registered successfully.`);
}

function editEmployee(oldEmpId) {
    editingOldEmpId = oldEmpId;
    document.getElementById("editEmpIdInput").value = oldEmpId;
    document.getElementById("editEmpNameInput").value = employees[oldEmpId];
    openModal("editEmployeeModal");
}

function submitEmployeeEdit() {
    let newEmpId = document.getElementById("editEmpIdInput").value.trim().toUpperCase();
    let newName = document.getElementById("editEmpNameInput").value.trim();
    
    if (!newEmpId || !newName) {
        showSystemNotification("Blank Fields", "Employee configurations cannot save empty fields.", false);
        return;
    }
    if (newEmpId !== editingOldEmpId && employees[newEmpId]) {
        showSystemNotification("Collision Alert", `The target Employee ID "${newEmpId}" is already taken.`, false);
        return;
    }
    
    if (newEmpId !== editingOldEmpId) {
        delete employees[editingOldEmpId];
    }
    employees[newEmpId] = newName;
    
    saveAndRefresh();
    showSystemNotification("Update Success", "Profile records re-mapped and updated successfully.");
}

function deleteEmployee(empId) {
    if (confirm(`⚠️ Remove employee "${employees[empId]}" (${empId})?`)) {
        delete employees[empId];
        saveAndRefresh();
    }
}

// --- TRANSACTION LIFECYCLE ---
function handleItemScan(id) {
    if (!inventory[id]) {
        showSystemNotification("Scan Rejected", `Item profile code "${id}" not found inside inventory listings.`, false);
        return;
    }
    activeItemId = id;
    document.getElementById("modalItemTitle").innerText = `Detected: ${inventory[id].name}`;
    openModal("optionsModal");
}

function handleReleaseVerification() {
    if (inventory[activeItemId].quantity <= 0) {
        showSystemNotification("Release Rejected", `Transaction Denied: "${inventory[activeItemId].name}" is out of stock (Quantity is 0).`, false);
    } else {
        openModal("releaseModal");
    }
}

function openAddModal() { openModal("addModal"); }

function submitAdd() {
    let qty = parseInt(document.getElementById("addQty").value);
    if(qty > 0) {
        inventory[activeItemId].quantity += qty;
        logTransaction(activeItemId, "ADD", qty, "N/A", new Date().toLocaleDateString());
        saveAndRefresh();
        showSystemNotification("Restock Success", `Successfully inbound-logged +${qty} units to inventory.`);
    }
}

function openEmployeeSelectionModal() {
    let qty = parseInt(document.getElementById("releaseQty").value);
    if (qty > inventory[activeItemId].quantity) {
        showSystemNotification("Allocation Error", `Requested allocation (${qty}) exceeds current stock capacity (${inventory[activeItemId].quantity}).`, false);
        return;
    }
    
    pendingReleaseQty = qty;
    
    // Build Employee Dropdown options dynamically from registered records
    const dropdown = document.getElementById("employeeDropdown");
    dropdown.innerHTML = '<option value="" disabled selected>-- Choose an Employee --</option>';
    
    for (let empId in employees) {
        dropdown.innerHTML += `<option value="${empId}">${employees[empId]} (${empId})</option>`;
    }
    
    document.getElementById("releaseDate").valueAsDate = new Date();
    document.getElementById("finalReleaseBtn").disabled = true; 
    openModal("employeeModal");
}

function handleEmployeeSelect() {
    let dropdown = document.getElementById("employeeDropdown");
    let submitBtn = document.getElementById("finalReleaseBtn");
    
    if (dropdown.value) {
        activeEmployeeId = dropdown.value;
        submitBtn.disabled = false;
    } else {
        submitBtn.disabled = true;
    }
}

function submitRelease() {
    inventory[activeItemId].quantity -= pendingReleaseQty;
    let authDate = document.getElementById("releaseDate").value;
    
    logTransaction(activeItemId, "RELEASE", pendingReleaseQty, employees[activeEmployeeId], authDate);
    saveAndRefresh();
    
    showSystemNotification(
        "Release Dispatched", 
        `Successfully signed out ${pendingReleaseQty} ${inventory[activeItemId].unit}(s) of "${inventory[activeItemId].name}" to ${employees[activeEmployeeId]}.`
    );
}

// --- EXCEL (CSV) EXPORT UTILITY ---
function exportToExcel() {
    if (transactionLogs.length === 0) {
        showSystemNotification("Export Warning", "There are no transaction records to export yet.", false);
        return;
    }

    let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
    csvContent += "System Timestamp,Product Item ID,Action Type,Quantity Ordered,Authorized Employee/Recipient,Signature Release Date\r\n";

    transactionLogs.forEach(log => {
        let row = [
            `"${log.timestamp}"`,
            `"${log.itemId}"`,
            `"${log.action}"`,
            log.qty,
            `"${log.employee}"`,
            `"${log.authorizedDate}"`
        ].join(",");
        csvContent += row + "\r\n";
    });

    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    
    const fileTimestamp = new Date().toISOString().slice(0,10);
    link.setAttribute("download", `CVLIS_Inventory_Report_${fileTimestamp}.csv`);
    
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

// --- HISTORIES LOG & RECORD STORAGE ---
function logTransaction(itemId, action, qty, employee, authorizedDate) {
    const timestamp = new Date().toLocaleString();
    transactionLogs.unshift({ timestamp, itemId, action, qty, employee, authorizedDate });
}

function saveAndRefresh() {
    localStorage.setItem("qr_inventory", JSON.stringify(inventory));
    localStorage.setItem("qr_employees", JSON.stringify(employees));
    localStorage.setItem("qr_logs", JSON.stringify(transactionLogs));
    renderTables();
}

function renderTables() {
    const invBody = document.getElementById("inventoryTable");
    invBody.innerHTML = "";
    for (let id in inventory) {
        let currentUnit = inventory[id].unit || "pcs";
        invBody.innerHTML += `<tr>
            <td><strong>${id}</strong></td>
            <td>${inventory[id].name} <span class="unit-label">${currentUnit}</span></td>
            <td>${inventory[id].quantity}</td>
            <td style="text-align:center;">
                <button class="danger action-btn" onclick="deleteItem('${id}')" title="Delete product item type">🗑️</button>
            </td>
        </tr>`;
    }

    const empBody = document.getElementById("employeesTable");
    empBody.innerHTML = "";
    for (let empId in employees) {
        empBody.innerHTML += `<tr>
            <td><strong>${empId}</strong></td>
            <td>${employees[empId]}</td>
            <td><span style="color:#28a745; font-weight:bold;">✔ Verified Active</span></td>
            <td style="text-align:center;">
                <button class="action-btn edit-btn" onclick="editEmployee('${empId}')" title="Edit Employee ID and Name">✏️</button>
                <button class="danger action-btn" onclick="deleteEmployee('${empId}')" title="Remove Employee Instance">🗑️</button>
            </td>
        </tr>`;
    }

    const logBody = document.getElementById("logTable");
    logBody.innerHTML = "";
    if (transactionLogs.length === 0) {
        logBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#999;">No transaction logs recorded yet.</td></tr>`;
    } else {
        transactionLogs.forEach(log => {
            let actionClass = "log-add";
            if (log.action === "RELEASE" || log.action === "DELETE") actionClass = "log-release";
            
            logBody.innerHTML += `<tr>
                <td>${log.timestamp}</td>
                <td><strong>${log.itemId}</strong></td>
                <td class="${actionClass}">${log.action}</td>
                <td>${log.qty}</td>
                <td>${log.employee}</td>
                <td>${log.authorizedDate}</td>
            </tr>`;
        });
    }
}

function updateBadgeDisplay(text, color) {
    const badge = document.getElementById("scannerStatus");
    badge.innerText = text;
    badge.style.background = color;
}

function openModal(id) {
    document.querySelectorAll('.modal').forEach(m => m.style.display = "none");
    document.getElementById(id).style.display = "flex";
}

function closeModals() {
    document.querySelectorAll('.modal').forEach(m => m.style.display = "none");
    document.getElementById("finalReleaseBtn").disabled = true;
    document.getElementById("addQty").value = 1;
    document.getElementById("releaseQty").value = 1;
    activeEmployeeId = "";
    editingOldEmpId = "";
}

function resetDatabase() {
    if(confirm("Are you sure you want to clear histories and reset default stocks?")) {
        localStorage.removeItem("qr_inventory");
        localStorage.removeItem("qr_employees");
        localStorage.removeItem("qr_logs");
        inventory = defaultInventory;
        employees = defaultEmployees;
        transactionLogs = [];
        renderTables();
    }
}

renderTables();
</script>
</body>
</html>
